# HybridStream — Full Stack
# Usage: docker compose -f docker-compose.full.yml up --build
# No host environment variables required. Just run it.

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    ports:
      - "2379:2379"
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: Mb8Y289SQ32bUBCXCVHWJA
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: hybridstream
      MINIO_ROOT_PASSWORD: hybridstream123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Init containers (run once, then exit) ───────────────────────────────────

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c "mc alias set hs http://minio:9000 hybridstream hybridstream123 && mc mb --ignore-existing hs/hybridstream-snapshots && echo 'MinIO ready'"
    restart: on-failure

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/sh -c "for t in w1-raw-zone-north w1-raw-zone-south w1-raw-zone-east w1-raw-zone-west w1-features w1-classified w2-sensors w2-zones w2-incidents w3-trades w3-risks w3-output; do kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic $$t --partitions 4 --replication-factor 1; done && echo 'Kafka ready'"
    restart: on-failure

  # ── Flink cluster ───────────────────────────────────────────────────────────

  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-port: 8081
        parallelism.default: 4
    volumes:
      - flink_data:/opt/flink/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  flink-taskmanager-1:
    image: flink:1.18.1-scala_2.12-java11
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      flink-jobmanager:
        condition: service_started

  flink-taskmanager-2:
    image: flink:1.18.1-scala_2.12-java11
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      flink-jobmanager:
        condition: service_started

  # ── HEA nodes (all defaults baked into config.py) ──────────────────────────

  hea-node-1:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50051:50051"
    environment:
      HEA_NODE_ID: hea-node-1
    volumes:
      - hea_data_1:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50051),3); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy

  hea-node-2:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50052:50051"
    environment:
      HEA_NODE_ID: hea-node-2
    volumes:
      - hea_data_2:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50051),3); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy

  hea-node-3:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50053:50051"
    environment:
      HEA_NODE_ID: hea-node-3
    volumes:
      - hea_data_3:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50051),3); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy

  hea-node-4:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50054:50051"
    environment:
      HEA_NODE_ID: hea-node-4
    volumes:
      - hea_data_4:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50051),3); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy

  # ── AODE (all defaults baked into config.py) ────────────────────────────────

  aode:
    build:
      context: ..
      dockerfile: aode/Dockerfile
    ports:
      - "50055:50055"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50055),3); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      hea-node-1:
        condition: service_healthy
      hea-node-2:
        condition: service_healthy
      hea-node-3:
        condition: service_healthy
      hea-node-4:
        condition: service_healthy

  # ── Flink Connector (all defaults baked into config) ────────────────────────

  flink-connector:
    build:
      context: ..
      dockerfile: flink-connector/Dockerfile
    ports:
      - "50056:50053"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/50053"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      aode:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy

volumes:
  kafka_data:
  minio_data:
  etcd_data:
  flink_data:
  hea_data_1:
  hea_data_2:
  hea_data_3:
  hea_data_4:

networks:
  default:
    name: hybridstream
