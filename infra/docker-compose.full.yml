version: "3.9"

services:
  # Infrastructure
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: "etcd0=http://etcd:2380"
      ETCD_INITIAL_CLUSTER_TOKEN: hybridstream-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: apache/kafka:3.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      etcd:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: hybridstream
      MINIO_ROOT_PASSWORD: hybridstream123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Init containers
  minio-init:
    image: minio/mc:RELEASE.2024-01-01T00-00-00Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 hybridstream hybridstream123;
      mc mb myminio/hybridstream-snapshots;
      mc policy set public myminio/hybridstream-snapshots;
      echo 'MinIO bucket created successfully'
      "

  kafka-init:
    image: apache/kafka:3.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Creating Kafka topics...';
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-raw-zone-north --partitions 4 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-raw-zone-south --partitions 4 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-raw-zone-east --partitions 4 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-raw-zone-west --partitions 4 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-features --partitions 2 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w1-classified --partitions 2 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w2-sensors --partitions 8 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w2-zones --partitions 4 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w2-incidents --partitions 2 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w3-trades --partitions 16 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w3-risks --partitions 8 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic w3-output --partitions 4 --replication-factor 1;
      echo 'Kafka topics created successfully'
      "

  # Flink cluster
  flink-jobmanager:
    image: flink:1.18.1-java11
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address=flink-jobmanager
      - JVM_ARGS=-Xmx2g -Xms1g
    volumes:
      - flink_data:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/jobmanager/config"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  flink-taskmanager-1:
    image: flink:1.18.1-java11
    command: taskmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address=flink-jobmanager|taskmanager.numberOfTaskSlots=4
      - JVM_ARGS=-Xmx3g -Xms2g
    volumes:
      - flink_data:/tmp
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-taskmanager-2:
    image: flink:1.18.1-java11
    command: taskmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address=flink-jobmanager|taskmanager.numberOfTaskSlots=4
      - JVM_ARGS=-Xmx3g -Xms2g
    volumes:
      - flink_data:/tmp
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # HybridStream components
  hea-node-1:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50051:50051"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: hybridstream
      MINIO_SECRET_KEY: hybridstream123
      MINIO_BUCKET: hybridstream-snapshots
      ETCD_ENDPOINTS: http://etcd:2379
      AODE_ENDPOINT: aode:50055
      HEA_NODE_ID: hea-node-1
      HEA_PORT: 50051
    volumes:
      - hea_data_1:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; grpc.channel_ready_future(grpc.insecure_channel('localhost:50051')).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  hea-node-2:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50052:50051"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: hybridstream
      MINIO_SECRET_KEY: hybridstream123
      MINIO_BUCKET: hybridstream-snapshots
      ETCD_ENDPOINTS: http://etcd:2379
      AODE_ENDPOINT: aode:50055
      HEA_NODE_ID: hea-node-2
      HEA_PORT: 50051
    volumes:
      - hea_data_2:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; grpc.channel_ready_future(grpc.insecure_channel('localhost:50051')).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  hea-node-3:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50053:50051"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: hybridstream
      MINIO_SECRET_KEY: hybridstream123
      MINIO_BUCKET: hybridstream-snapshots
      ETCD_ENDPOINTS: http://etcd:2379
      AODE_ENDPOINT: aode:50055
      HEA_NODE_ID: hea-node-3
      HEA_PORT: 50051
    volumes:
      - hea_data_3:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; grpc.channel_ready_future(grpc.insecure_channel('localhost:50051')).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  hea-node-4:
    build:
      context: ..
      dockerfile: hea/Dockerfile
    ports:
      - "50054:50051"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: hybridstream
      MINIO_SECRET_KEY: hybridstream123
      MINIO_BUCKET: hybridstream-snapshots
      ETCD_ENDPOINTS: http://etcd:2379
      AODE_ENDPOINT: aode:50055
      HEA_NODE_ID: hea-node-4
      HEA_PORT: 50051
    volumes:
      - hea_data_4:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; grpc.channel_ready_future(grpc.insecure_channel('localhost:50051')).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  aode:
    build:
      context: ..
      dockerfile: aode/Dockerfile
    ports:
      - "50055:50055"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      ETCD_ENDPOINTS: http://etcd:2379
      FLINK_CONNECTOR_ENDPOINT: flink-connector:50056
      HEA_ENDPOINTS: hea-node-1:50051,hea-node-2:50051,hea-node-3:50051,hea-node-4:50051
      AODE_PORT: 50055
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; grpc.channel_ready_future(grpc.insecure_channel('localhost:50055')).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      hea-node-1:
        condition: service_healthy
      hea-node-2:
        condition: service_healthy
      hea-node-3:
        condition: service_healthy
      hea-node-4:
        condition: service_healthy

  flink-connector:
    build:
      context: ..
      dockerfile: flink-connector/Dockerfile
    ports:
      - "50056:50053"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      FLINK_JOBMANAGER_URL: http://flink-jobmanager:8081
      SCHEMA_DIR: /app/schemas
      FLINK_CONNECTOR_PORT: 50053
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/app.jar", "-Djava.awt.headless=true", "ai.solarity.hybridstream.HealthCheck"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      aode:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy

volumes:
  kafka_data:
  minio_data:
  etcd_data:
  flink_data:
  hea_data_1:
  hea_data_2:
  hea_data_3:
  hea_data_4:

networks:
  default:
    name: hybridstream